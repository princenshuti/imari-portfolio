<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Cream paper background -->
  <rect width="1200" height="630" fill="#F2EDE2"/>

  <!-- Subtle gold radial accent, top-right -->
  <defs>
    <radialGradient id="glow" cx="85%" cy="15%" r="55%">
      <stop offset="0%"  stop-color="#C4932A" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#C4932A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C4932A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandToGold" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#0D4B3A"/>
      <stop offset="100%" stop-color="#C4932A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand lockup, top-left -->
  <g transform="translate(80, 80)">
    <rect width="44" height="44" rx="11" fill="#0D4B3A"/>
    <circle cx="22" cy="22" r="7" fill="#FEFCF7"/>
    <text x="60" y="32" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-size="34" fill="#1A170E">Imari</text>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(80, 220)">
    <rect width="320" height="34" rx="17" fill="#E5F0EC" stroke="#CCE0D8" stroke-width="1"/>
    <circle cx="20" cy="17" r="3.5" fill="#0D4B3A"/>
    <text x="32" y="22" font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#0D4B3A">Personal wealth · Built for Rwanda</text>
  </g>

  <!-- Big serif headline -->
  <text x="80" y="335" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-size="84" fill="#1A170E" letter-spacing="-1.5">Stop guessing</text>
  <text x="80" y="425" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-size="84" font-style="italic" fill="url(#brandToGold)" letter-spacing="-1.5">what you’re worth.</text>

  <!-- Subtitle -->
  <text x="80" y="500" font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#6B6452">Every account, every asset — in one live picture. In RWF and USD.</text>

  <!-- Net-worth preview card, bottom-right -->
  <g transform="translate(760, 320)">
    <rect width="360" height="200" rx="20" fill="#FEFCF7" stroke="rgba(26,22,14,0.09)" stroke-width="0.75"/>
    <rect width="360" height="3" rx="1.5" fill="url(#brandToGold)"/>
    <text x="24" y="44" font-family="'Geist', sans-serif" font-size="11" font-weight="600" letter-spacing="1.4" fill="#9C9485">NET WORTH</text>
    <text x="24" y="92" font-family="'Geist Mono', 'SF Mono', Menlo, monospace" font-size="14" font-weight="600" fill="#9C9485">RWF</text>
    <text x="68" y="96" font-family="'Geist Mono', 'SF Mono', Menlo, monospace" font-size="38" font-weight="500" fill="#1A170E" letter-spacing="-0.5">24,830,000</text>
    <g transform="translate(24, 112)">
      <rect width="62" height="22" rx="11" fill="#D0E9DD"/>
      <text x="31" y="15" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#1A7A52" text-anchor="middle">↑ 8.4%</text>
      <text x="74" y="15" font-family="'Geist', sans-serif" font-size="12" fill="#6B6452">this quarter</text>
    </g>
    <!-- Sparkline -->
    <path d="M24,180 L57,172 L90,176 L123,158 L156,164 L189,144 L222,150 L255,132 L288,124 L321,128 L336,110"
          fill="none" stroke="#0D4B3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Footer line -->
  <text x="80" y="580" font-family="'Geist', sans-serif" font-size="13" font-weight="500" letter-spacing="0.5" fill="#9C9485">IMARI.MAXVENTURES.RW · BY MAXVENTURES</text>
</svg>
